litellm_settings:
  drop_params: true
  set_verbose: false
  disable_spend_logs: true

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  allow_user_auth: false
  database_url: null
  allow_clientside_credentials: true
