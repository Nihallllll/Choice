version: "3.8"

services:
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      # This is the proxy master key — NOT any LLM provider key.
      # Users provide their own LLM keys through the frontend.
      LITELLM_MASTER_KEY: "sk-master-1234"

      # These placeholder values are required by LiteLLM config parsing
      # but are overridden per-request by the user's key from the request body.
      OPENAI_API_KEY_PLACEHOLDER: "placeholder"
      GEMINI_API_KEY_PLACEHOLDER: "placeholder"
      ANTHROPIC_API_KEY_PLACEHOLDER: "placeholder"
      GROQ_API_KEY_PLACEHOLDER: "placeholder"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped

    # Optional: enable if you want request logging / spend tracking
    # depends_on:
    #   - postgres
    # environment:
    #   DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm

